name: Docker Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy - Pull and run on server
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -n "$HOST" ] && [ -n "$SSH_KEY" ]; then
            echo "$SSH_KEY" | base64 -d > /tmp/deploy_key
            chmod 600 /tmp/deploy_key
            ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key "$USER@$HOST" "
              cd /home/lewellyn/aigateway/ai-gateway &&
              docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest &&
              docker-compose up -d --pull
            "
            rm -f /tmp/deploy_key
          else
            echo "Deployment secrets not configured. Skipping deployment step."
            echo "To enable deployment, configure: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY"
          fi
