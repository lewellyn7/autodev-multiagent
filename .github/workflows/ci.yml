name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install ruff
        run: |
          pip install ruff

      - name: Run Ruff lint
        run: |
          ruff check app/ tests/ --output-format=github

      - name: Run Ruff format check
        run: |
          ruff format app/ tests/ --check

  # ---------------------------------------------------------------------------
  # Job 2: Test (using Docker)
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: test-image:latest
          cache-from: type=gha

      - name: Run tests in Docker
        run: |
          docker run --rm -u root -v $(pwd):/app -w /app test-image:latest bash -c "
            pip install pytest pytest-asyncio httpx > /dev/null 2>&1 &&
            pytest tests/test_main.py -v --tb=short
          "

  # ---------------------------------------------------------------------------
  # Job 3: Build Docker Image
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 4: Deploy
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -n "$HOST" ] && [ -n "$KEY" ]; then
            echo "$KEY" | base64 -d > /tmp/deploy_key
            chmod 600 /tmp/deploy_key
            ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key "$USER@$HOST" "
              cd /home/lewellyn/aigateway/ai-gateway &&
              docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest &&
              docker-compose -f docker-compose.dev.yml up -d
            "
            rm -f /tmp/deploy_key
          else
            echo "Deploy skipped: secrets not configured"
          fi
