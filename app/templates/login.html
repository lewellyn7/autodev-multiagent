<!DOCTYPE html>
<html><head><title>Login</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="flex justify-center items-center h-screen bg-gray-100">
<div class="bg-white p-8 rounded shadow w-80">
    <h2 class="text-xl mb-4 text-center">AI Gateway v4</h2>
    <input id="u" class="border w-full p-2 mb-4" placeholder="Admin User">
    <input id="p" type="password" class="border w-full p-2 mb-4" placeholder="Password">
    <button onclick="login()" class="bg-blue-600 text-white w-full py-2 rounded">Login</button>
</div>
<script>
async function login(){
    const fd=new FormData(); fd.append('username', document.getElementById('u').value); fd.append('password', document.getElementById('p').value);
    const r=await fetch('/login',{method:'POST',body:fd});
    if(r.ok) location.href='/'; else alert('Failed');
}
</script></body></html>
