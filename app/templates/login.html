<!DOCTYPE html>
<html>
<head>
    <title>AI Gateway Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen bg-gradient-to-br from-gray-100 to-gray-200">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-1">🤖 AI Gateway</h2>
            <p class="text-sm text-gray-400 font-mono">v1.0.0</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">用户名</label>
                <input id="u" type="text" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" placeholder="admin" autocomplete="username">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">密码</label>
                <input id="p" type="password" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" placeholder="••••••••" autocomplete="current-password">
            </div>
            <div id="err" class="hidden text-red-500 text-sm text-center py-2 bg-red-50 rounded-lg"></div>
            <button id="btn" onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition shadow-md hover:shadow-lg flex items-center justify-center gap-2">
                <span>登录</span>
            </button>
        </div>
        <p class="text-center text-xs text-gray-300 mt-6">AI Gateway Admin Panel</p>
    </div>

<script>
let loading = false;

async function login() {
    if (loading) return;
    const errEl = document.getElementById('err');
    const btn = document.getElementById('btn');
    const u = document.getElementById('u').value.trim();
    const p = document.getElementById('p').value;

    errEl.classList.add('hidden');
    if (!u || !p) {
        errEl.textContent = '请输入用户名和密码';
        errEl.classList.remove('hidden');
        return;
    }

    loading = true;
    btn.disabled = true;
    btn.innerHTML = '<svg class="w-5 h-5 spinner" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg><span>登录中...</span>';

    try {
        const fd = new FormData();
        fd.append('username', u);
        fd.append('password', p);
        const r = await fetch('/login', {method: 'POST', body: fd});
        if (r.ok) {
            location.href = '/';
        } else {
            const d = await r.json();
            errEl.textContent = d.msg || '登录失败，请检查凭据';
            errEl.classList.remove('hidden');
            btn.disabled = false;
            btn.innerHTML = '<span>登录</span>';
        }
    } catch(e) {
        errEl.textContent = '网络错误，请重试';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<span>登录</span>';
    } finally {
        loading = false;
    }
}

// Enter key support
document.getElementById('p').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') login();
});
</script>
</body>
</html>
