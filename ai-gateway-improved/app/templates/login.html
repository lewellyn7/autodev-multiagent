<!DOCTYPE html>
<html>
<head>
    <title>AI Gateway - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .float { animation: float 3s ease-in-out infinite; }
        @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.4); opacity: 0; } }
        .pulse-ring { animation: pulse-ring 2s ease-out infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .gradient-animate { background-size: 200% 200%; animation: gradientShift 4s ease infinite; }
        @keyframes successPop { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
        .success-pop { animation: successPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .input-glow:focus { box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
        .dark .input-glow:focus { box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25); }
        /* Floating orbs background */
        .orb { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.3; pointer-events: none; }
        .dark .orb { opacity: 0.15; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-4">
    <!-- Background -->
    <div class="fixed inset-0 overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-indigo-50 via-white to-purple-50 dark:from-gray-900 dark:via-gray-800 dark:to-indigo-950 gradient-animate"></div>
        <!-- Orbs -->
        <div class="orb w-96 h-96 bg-indigo-400 top-0 -left-48" style="animation: float 6s ease-in-out infinite;"></div>
        <div class="orb w-72 h-72 bg-purple-400 bottom-0 right-0" style="animation: float 8s ease-in-out infinite 1s;"></div>
        <div class="orb w-64 h-64 bg-blue-400 top-1/2 left-1/2" style="animation: float 7s ease-in-out infinite 2s;"></div>
    </div>

    <!-- Login Card -->
    <div id="card" class="relative w-full max-w-sm fade-in">
        <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 rounded-2xl blur opacity-20 dark:opacity-10"></div>
        <div class="relative bg-white/90 dark:bg-gray-800/90 backdrop-blur-xl p-8 rounded-2xl shadow-xl border border-white/50 dark:border-gray-700/50">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="relative inline-block mb-4">
                    <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-3xl shadow-lg float">🤖</div>
                    <div class="absolute inset-0 w-16 h-16 bg-indigo-400 rounded-2xl pulse-ring" style="animation-delay: 0.5s;"></div>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-1">AI Gateway</h2>
                <div class="flex items-center justify-center gap-2">
                    <span class="text-[10px] bg-indigo-100 dark:bg-indigo-900 text-indigo-600 dark:text-indigo-300 px-2 py-0.5 rounded-full font-mono font-bold">v1.0.0</span>
                    <span class="text-[10px] text-gray-400 dark:text-gray-500">Admin Panel</span>
                </div>
            </div>

            <!-- Form -->
            <div class="space-y-5">
                <!-- Username -->
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 dark:text-gray-400 uppercase tracking-widest mb-2">用户名</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 dark:text-gray-500 text-sm">👤</span>
                        <input id="u" type="text"
                               class="w-full pl-10 pr-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl text-sm bg-gray-50/50 dark:bg-gray-900/50 dark:text-gray-100 focus:outline-none input-glow transition placeholder-gray-300 dark:placeholder-gray-500"
                               placeholder="admin" autocomplete="username">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 dark:text-gray-400 uppercase tracking-widest mb-2">密码</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 dark:text-gray-500 text-sm">🔒</span>
                        <input id="p" type="password"
                               class="w-full pl-10 pr-12 py-3 border border-gray-200 dark:border-gray-600 rounded-xl text-sm bg-gray-50/50 dark:bg-gray-900/50 dark:text-gray-100 focus:outline-none input-glow transition placeholder-gray-300 dark:placeholder-gray-500"
                               placeholder="••••••••" autocomplete="current-password">
                        <button type="button" onclick="togglePassword()" id="toggleBtn" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-300 dark:text-gray-500 hover:text-gray-500 dark:hover:text-gray-300 transition text-sm">👁️</button>
                    </div>
                </div>

                <!-- Error -->
                <div id="err" class="hidden">
                    <div class="flex items-center gap-2 text-red-500 dark:text-red-400 bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-900/30 rounded-xl px-4 py-2.5 text-sm">
                        <span>⚠️</span>
                        <span id="errText"></span>
                    </div>
                </div>

                <!-- Success -->
                <div id="success" class="hidden">
                    <div class="flex items-center gap-2 text-green-600 dark:text-green-400 bg-green-50 dark:bg-green-900/20 border border-green-100 dark:border-green-900/30 rounded-xl px-4 py-2.5 text-sm">
                        <span>✅</span>
                        <span>登录成功，跳转中...</span>
                    </div>
                </div>

                <!-- Submit -->
                <button id="btn" onclick="login()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-3 rounded-xl transition shadow-lg hover:shadow-xl active:scale-[0.98] flex items-center justify-center gap-2 text-sm">
                    <span>🚀</span>
                    <span>登录</span>
                </button>
            </div>

            <!-- Footer -->
            <div class="text-center mt-8">
                <div class="text-[10px] text-gray-300 dark:text-gray-600">AI Gateway Admin Panel</div>
            </div>
        </div>
    </div>

    <!-- Dark mode toggle (subtle) -->
    <button onclick="toggleDark()" class="fixed top-4 right-4 w-9 h-9 rounded-full bg-white/80 dark:bg-gray-800/80 backdrop-blur shadow-md flex items-center justify-center text-sm hover:scale-110 transition cursor-pointer border border-gray-200 dark:border-gray-700" title="Toggle dark mode">
        <span id="darkIcon">🌙</span>
    </button>

<script>
let loading = false;

function initDark() {
    if (localStorage.getItem('darkMode') === '1' || (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        document.getElementById('darkIcon').textContent = '☀️';
    } else {
        document.getElementById('darkIcon').textContent = '🌙';
    }
}

function toggleDark() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('darkMode', isDark ? '1' : '0');
    document.getElementById('darkIcon').textContent = isDark ? '☀️' : '🌙';
}

function togglePassword() {
    const p = document.getElementById('p');
    const btn = document.getElementById('toggleBtn');
    if (p.type === 'password') {
        p.type = 'text';
        btn.textContent = '🙈';
    } else {
        p.type = 'password';
        btn.textContent = '👁️';
    }
}

function showError(msg) {
    const errEl = document.getElementById('err');
    const card = document.getElementById('card');
    document.getElementById('errText').textContent = msg;
    errEl.classList.remove('hidden');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);
}

function hideError() {
    document.getElementById('err').classList.add('hidden');
}

async function login() {
    if (loading) return;
    const u = document.getElementById('u').value.trim();
    const p = document.getElementById('p').value;
    const btn = document.getElementById('btn');

    hideError();
    if (!u || !p) {
        showError('请输入用户名和密码');
        return;
    }

    loading = true;
    btn.disabled = true;
    btn.innerHTML = '<svg class="w-5 h-5 spinner" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg><span>登录中...</span>';
    btn.classList.add('opacity-80');

    try {
        const fd = new FormData();
        fd.append('username', u);
        fd.append('password', p);
        const r = await fetch('/login', { method: 'POST', body: fd });
        if (r.ok) {
            document.getElementById('success').classList.remove('hidden');
            btn.innerHTML = '<span class="success-pop inline-block">✅</span><span>成功</span>';
            setTimeout(() => { location.href = '/'; }, 600);
        } else {
            const d = await r.json();
            showError(d.msg || '登录失败，请检查凭据');
            btn.disabled = false;
            btn.innerHTML = '<span>🚀</span><span>登录</span>';
            btn.classList.remove('opacity-80');
        }
    } catch(e) {
        showError('网络错误，请重试');
        btn.disabled = false;
        btn.innerHTML = '<span>🚀</span><span>登录</span>';
        btn.classList.remove('opacity-80');
    } finally {
        loading = false;
    }
}

// Enter key support
document.getElementById('p').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') login();
});
document.getElementById('u').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') login();
});

// Init
initDark();
</script>
</body>
</html>
